  /admin/organizations/{organization}/status:
    parameters:
      - { name: organization, in: path, required: true, schema: { type: integer } }
    post:
      tags: [Admin]
      summary: Reversible lifecycle change (organizations.manage)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [active, suspended, inactive, pending] }
      responses:
        "200": { description: OK }
        "422": { $ref: "#/components/responses/ValidationError" }

