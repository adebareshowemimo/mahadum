  /admin/organizations/{organization}:
    parameters:
      - { name: organization, in: path, required: true, schema: { type: integer } }
    get:
      tags: [Admin]
      summary: Organization drill-down — profile, members, invoices, classes, referrals, audit (organizations.view)
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: object, properties: { data: { type: object } } } } } }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      tags: [Admin]
      summary: Edit an organization profile (organizations.manage)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                contact_email: { type: string, format: email, nullable: true }
