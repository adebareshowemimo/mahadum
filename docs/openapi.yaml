      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      organization: { type: object, properties: { id: { type: integer }, name: { type: string }, status: { type: string } } }
                      classes: { type: integer }
                      students: { type: integer }
                      seats: { type: object, properties: { purchased: { type: integer }, filled: { type: integer } } }
                      invoices: { type: object, properties: { unpaid: { type: integer }, unpaid_minor: { type: integer } } }
        "403": { $ref: "#/components/responses/Forbidden" }

  /schools/{organization}/students/import:
    parameters:
      - $ref: "#/components/parameters/OrganizationId"
    post:
      tags: [School]
      summary: Bulk import students (schools.roster.import)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                students:
                  type: array
                  description: "required without `file`"
                  items:
                    type: object
                    required: [display_name]
                    properties:
                      display_name: { type: string, maxLength: 255 }
                      level: { type: string, maxLength: 100, nullable: true }
                      class_id: { type: integer, nullable: true }
                class_id: { type: integer, nullable: true }
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary, description: "csv/txt, max 2 MB; required without `students`" }
                class_id: { type: integer, nullable: true }
      responses:
        "201":
          description: Created (per-row soft errors reported)
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      created: { type: integer }
                      errors:
                        type: array
                        items:
                          type: object
                          properties:
                            row: { type: integer }
                            error: { type: string }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /schools/{organization}/seats:
    parameters:
