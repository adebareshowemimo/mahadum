                      invoice_id: { type: integer }
        "403": { $ref: "#/components/responses/Forbidden" }
        "422": { $ref: "#/components/responses/ValidationError" }

  /schools/{organization}/invoices:
    parameters:
      - $ref: "#/components/parameters/OrganizationId"
    get:
      tags: [School]
      summary: Organization invoices (billing.invoices.view)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        type: { type: string }
                        amount_minor: { type: integer }
                        status: { type: string }
                        issued_at: { type: string, format: date-time, nullable: true }
