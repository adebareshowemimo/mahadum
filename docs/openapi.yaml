  /admin/payouts/{payout}/approve:
    parameters:
      - name: payout
        in: path
        required: true
        schema: { type: integer }
    post:
      tags: [Admin]
      summary: Approve a payout (super_admin; separation-of-duties enforced)
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id: { type: integer }
                      status: { type: string, example: approved }
                      approved_by: { type: integer }
        "403":
          description: Self-approval forbidden, or not authorized
          content:
            application/json:
              schema:
                oneOf:
                  - { $ref: "#/components/schemas/ErrorEnvelope" }
                  - { $ref: "#/components/schemas/MessageError" }
        "409":
          description: Payout not in a requested state
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorEnvelope" }
        "404": { $ref: "#/components/responses/NotFound" }

