                max_profiles: { type: integer, nullable: true }
                features: { type: object, nullable: true }
      responses: { "201": { description: Created }, "422": { $ref: "#/components/responses/ValidationError" } }
  /admin/plans/{plan}:
    parameters:
      - { name: plan, in: path, required: true, schema: { type: integer } }
    patch:
      tags: [Admin]
      summary: Edit price/interval/profile-cap/features (billing.plans.manage)
      responses: { "200": { description: OK }, "422": { $ref: "#/components/responses/ValidationError" } }

  /admin/payment-gateways:
    get:
      tags: [Admin]
      summary: Per-provider gateway status + env-var checklist; secrets never returned (system.settings.manage)
      responses: { "200": { description: OK } }
  /admin/payment-gateways/{provider}/test:
    parameters:
      - { name: provider, in: path, required: true, schema: { type: string } }
    post:
      tags: [Admin]
      summary: Live credential ping — harmless authenticated read (system.settings.manage)
      responses: { "200": { description: OK, content: { application/json: { schema: { type: object, properties: { data: { type: object, properties: { ok: { type: boolean }, message: { type: string } } } } } } } } }

  /admin/settings:
    get:
      tags: [Admin]
      summary: DB-backed platform settings, grouped (system.settings.manage)
      responses: { "200": { description: OK } }
    patch:
      tags: [Admin]
      summary: Update whitelisted settings, per-key validated + audited (system.settings.manage)
      responses: { "200": { description: OK }, "422": { $ref: "#/components/responses/ValidationError" } }

  # --------------------------------------------------------------- Admin: fraud review
  /admin/referrals/flagged:
    get:
      tags: [Admin]
      summary: Flagged/frozen referral codes with velocity counts (referrals.fraud.review)
      responses: { "200": { description: OK } }
  /admin/referrals/{referralCode}/clear:
    parameters:
      - { name: referralCode, in: path, required: true, schema: { type: integer } }
    post:
      tags: [Admin]
      summary: Clear a flagged code back to active (referrals.fraud.review)
      responses: { "200": { description: OK } }
  /admin/referrals/{referralCode}/freeze:
    parameters:
      - { name: referralCode, in: path, required: true, schema: { type: integer } }
    post:
      tags: [Admin]
      summary: Freeze a code as confirmed fraud (referrals.fraud.review)
      responses: { "200": { description: OK } }

  # --------------------------------------------------------------- Admin: support triage
  /admin/support-tickets:
    get:
      tags: [Admin]
      summary: Support queue — paginated, status filter, open-count + assignees (support.handle)
      parameters:
        - { name: status, in: query, schema: { type: string } }
        - { name: q, in: query, schema: { type: string } }
      responses: { "200": { description: OK } }
  /admin/support-tickets/{ticket}:
    parameters:
      - { name: ticket, in: path, required: true, schema: { type: integer } }
    patch:
      tags: [Admin]
      summary: Set status/priority/assignee/response (support.handle)
      responses: { "200": { description: OK }, "422": { $ref: "#/components/responses/ValidationError" } }
  /admin/support-tickets/{ticket}/messages:
    parameters:
      - { name: ticket, in: path, required: true, schema: { type: integer } }
    post:
      tags: [Admin]
      summary: Staff reply in the ticket thread; emails the requester (support.handle)
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, required: [body], properties: { body: { type: string, maxLength: 4000 } } }
      responses: { "201": { description: Created } }

  # --------------------------------------------------------------- Content: media orphans
  /media/orphans:
    get:
      tags: [Content]
      summary: Unreferenced media assets — paginated + filterable (content.media.upload)
      parameters:
        - { name: q, in: query, schema: { type: string } }
        - { name: type, in: query, schema: { type: string } }
        - { name: per_page, in: query, schema: { type: integer } }
      responses: { "200": { description: OK } }
  /media/orphans/purge:
    post:
      tags: [Content]
      summary: Bulk-delete orphaned assets — re-checked against live references (content.media.upload)
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, required: [ids], properties: { ids: { type: array, items: { type: integer } } } }
      responses: { "200": { description: OK, content: { application/json: { schema: { type: object, properties: { data: { type: object, properties: { deleted: { type: integer }, skipped: { type: integer } } } } } } } } }

  # =============================================================== Email system
  /admin/email-campaigns:
    get:
      tags: [Email]
      summary: List email campaigns (emails.campaigns.manage)
      responses: { "200": { description: OK }, "403": { $ref: "#/components/responses/Forbidden" } }
    post:
      tags: [Email]
      summary: Create a draft campaign (emails.campaigns.manage)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subject, body, audience_type]
              properties:
                subject: { type: string, maxLength: 200 }
                body: { type: string, description: Markdown, rendered in the brand template }
                audience_type: { type: string, enum: [user_segment, contact_list] }
                audience:
                  type: object
                  properties:
                    contact_list_id: { type: integer }
                    role: { type: string }
                    status: { type: string }
                    organization_id: { type: integer }
      responses: { "201": { description: Created }, "422": { $ref: "#/components/responses/ValidationError" } }
  /admin/email-campaigns/{emailCampaign}:
    parameters:
      - { name: emailCampaign, in: path, required: true, schema: { type: integer } }
    get:
      tags: [Email]
      summary: Campaign detail + recipient status breakdown (emails.campaigns.manage)
      responses: { "200": { description: OK }, "404": { $ref: "#/components/responses/NotFound" } }
  /admin/email-campaigns/{emailCampaign}/test:
    parameters:
      - { name: emailCampaign, in: path, required: true, schema: { type: integer } }
    post:
      tags: [Email]
      summary: Send a preview to the admin's own address (emails.campaigns.manage)
      responses: { "200": { description: OK, content: { application/json: { schema: { type: object, properties: { data: { type: object, properties: { sent_to: { type: string } } } } } } } } }
  /admin/email-campaigns/{emailCampaign}/send:
    parameters:
      - { name: emailCampaign, in: path, required: true, schema: { type: integer } }
    post:
      tags: [Email]
      summary: Send now, or schedule if scheduled_at is future (emails.campaigns.manage) — 409 if already sent
      requestBody:
        content:
          application/json:
            schema: { type: object, properties: { scheduled_at: { type: string, format: date-time, nullable: true } } }
      responses: { "200": { description: OK }, "409": { description: Already sent } }
  /admin/email-campaigns/{emailCampaign}/cancel:
    parameters:
      - { name: emailCampaign, in: path, required: true, schema: { type: integer } }
    post:
      tags: [Email]
      summary: Cancel a scheduled campaign back to draft (emails.campaigns.manage) — 409 if not scheduled
      responses: { "200": { description: OK }, "409": { description: Not scheduled } }
  /admin/email-campaigns/{emailCampaign}/recipients:
    parameters:
      - { name: emailCampaign, in: path, required: true, schema: { type: integer } }
    get:
      tags: [Email]
      summary: Paginated per-recipient delivery rows, status filter (emails.campaigns.manage)
      parameters:
        - { name: status, in: query, schema: { type: string, enum: [queued, sent, failed, suppressed] } }
        - { name: page, in: query, schema: { type: integer } }
      responses: { "200": { description: OK } }

  /admin/email-log:
    get:
      tags: [Email]
      summary: Log of every outbound email — paginated + filterable (emails.log.view)
      parameters:
        - { name: q, in: query, schema: { type: string }, description: Search recipient }
        - { name: type, in: query, schema: { type: string, enum: [transactional, marketing] } }
        - { name: status, in: query, schema: { type: string } }
        - { name: source, in: query, schema: { type: string } }
        - { name: from, in: query, schema: { type: string, format: date } }
        - { name: to, in: query, schema: { type: string, format: date } }
        - { name: page, in: query, schema: { type: integer } }
      responses: { "200": { description: OK } }

  /admin/contact-lists:
    get:
      tags: [Email]
      summary: List contact lists with counts (emails.contacts.manage)
      responses: { "200": { description: OK } }
    post:
      tags: [Email]
      summary: Create a contact list (emails.contacts.manage)
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, required: [name], properties: { name: { type: string, maxLength: 160 }, description: { type: string, nullable: true } } }
      responses: { "201": { description: Created }, "422": { $ref: "#/components/responses/ValidationError" } }
  /admin/contact-lists/{contactList}:
    parameters:
      - { name: contactList, in: path, required: true, schema: { type: integer } }
    get:
      tags: [Email]
      summary: List detail + paginated contacts (emails.contacts.manage)
      parameters:
        - { name: page, in: query, schema: { type: integer } }
      responses: { "200": { description: OK } }
  /admin/contact-lists/{contactList}/import/preview:
    parameters:
      - { name: contactList, in: path, required: true, schema: { type: integer } }
    post:
      tags: [Email]
      summary: Stage an upload — classify valid/duplicate/invalid/suppressed without storing (emails.contacts.manage)
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                emails: { type: string, description: Pasted addresses (newline/comma/semicolon separated) }
                file: { type: string, format: binary, description: CSV or XLSX (first col email, optional name) }
      responses: { "200": { description: OK, content: { application/json: { schema: { type: object, properties: { data: { type: object, properties: { counts: { type: object }, valid: { type: array, items: { type: object } } } } } } } } } }
  /admin/contact-lists/{contactList}/import:
    parameters:
      - { name: contactList, in: path, required: true, schema: { type: integer } }
    post:
      tags: [Email]
      summary: Commit the reviewed set — inserts new subscribers, re-checked (emails.contacts.manage)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [contacts]
              properties:
                contacts:
                  type: array
                  items: { type: object, required: [email], properties: { email: { type: string, format: email }, name: { type: string, nullable: true } } }
      responses: { "200": { description: OK, content: { application/json: { schema: { type: object, properties: { data: { type: object, properties: { imported: { type: integer }, skipped: { type: integer } } } } } } } } }
  /admin/contact-lists/{contactList}/uploads:
    parameters:
      - { name: contactList, in: path, required: true, schema: { type: integer } }
    get:
      tags: [Email]
      summary: Import history for a list (emails.contacts.manage)
      responses: { "200": { description: OK } }
  /admin/contact-lists/{contactList}/uploads/{batch}/rollback:
    parameters:
      - { name: contactList, in: path, required: true, schema: { type: integer } }
      - { name: batch, in: path, required: true, schema: { type: integer } }
    post:
      tags: [Email]
      summary: Undo an import — delete the contacts it added (emails.contacts.manage) — 409 if already rolled back
      responses: { "200": { description: OK, content: { application/json: { schema: { type: object, properties: { data: { type: object, properties: { removed: { type: integer } } } } } } } }, "409": { description: Already rolled back } }
  /admin/contact-lists/{contactList}/contacts:
    parameters:
      - { name: contactList, in: path, required: true, schema: { type: integer } }
    post:
      tags: [Email]
      summary: Add one contact manually — deduped + suppression-checked (emails.contacts.manage)
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, required: [email], properties: { email: { type: string, format: email }, name: { type: string, nullable: true } } }
      responses: { "201": { description: Created }, "422": { description: Duplicate or suppressed } }
  /admin/contact-lists/{contactList}/contacts/{contact}:
    parameters:
      - { name: contactList, in: path, required: true, schema: { type: integer } }
      - { name: contact, in: path, required: true, schema: { type: integer } }
    patch:
      tags: [Email]
      summary: Edit a contact's name or subscription status (emails.contacts.manage)
      requestBody:
        content:
          application/json:
            schema: { type: object, properties: { name: { type: string, nullable: true }, status: { type: string, enum: [subscribed, unsubscribed] } } }
      responses: { "200": { description: OK } }
    delete:
      tags: [Email]
      summary: Remove a contact (emails.contacts.manage)
      responses: { "204": { description: No Content } }

  # --------------------------------------------------------------- Webhooks
  /webhooks/paystack:
    post:
      tags: [Webhooks]
      summary: Paystack webhook (HMAC-SHA512 signed)
      security: []
      parameters:
        - name: x-paystack-signature
          in: header
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        "200":
          description: Processed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WebhookStatus" }
        "401":
          description: Invalid signature
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MessageError" }

  /webhooks/flutterwave:
    post:
      tags: [Webhooks]
      summary: Flutterwave webhook (verif-hash)
      security: []
      parameters:
        - name: verif-hash
          in: header
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        "200":
          description: Processed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/WebhookStatus" }
        "401":
          description: Invalid signature
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MessageError" }

  /webhooks/telco/dlr:
    post:
      tags: [Webhooks]
      summary: Telco delivery/billing result (SDP)
      description: HMAC-SHA256 signed (raw body) and idempotent on operator_ref.
      security: []
      parameters:
        - name: x-telco-signature
          in: header
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                operator_ref: { type: string }
                result: { type: string, description: "success | <other = error>" }
              additionalProperties: true
      responses:
        "200":
          description: Processed (or duplicate on replay)
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, description: "ok | duplicate" }
        "401":
          description: Invalid signature
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MessageError" }

  /webhooks/sendgrid/{token}:
    parameters:
      - { name: token, in: path, required: true, schema: { type: string }, description: Shared-secret token (fallback when ECDSA is not configured) }
    post:
      tags: [Webhooks]
      summary: SendGrid Event Webhook — bounce/complaint → suppression
      description: |
        ECDSA Signed-Event verification when a public key is configured (headers
        `X-Twilio-Email-Event-Webhook-Signature` + `-Timestamp`), else the URL token.
        Bounce/dropped/spamreport events add the address to the suppression list and
        update the recipient's latest email-log row. Idempotent.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                properties:
                  email: { type: string }
                  event: { type: string, enum: [delivered, bounce, dropped, spamreport, open, click] }
                additionalProperties: true
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: object, properties: { ok: { type: boolean } } } } } }
        "403": { description: Bad signature or token }

  # --------------------------------------------------------------- Support (consumer)
  /support/tickets:
    get:
      tags: [Account]
      summary: The signed-in user's support tickets, with the message thread
      responses: { "200": { description: OK } }
    post:
      tags: [Account]
      summary: Raise a support ticket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subject, message]
              properties:
                subject: { type: string, maxLength: 160 }
                category: { type: string, enum: [billing, account, technical, content, other], nullable: true }
                message: { type: string, maxLength: 4000 }
      responses: { "201": { description: Created }, "422": { $ref: "#/components/responses/ValidationError" } }
  /support/tickets/{ticket}/messages:
    parameters:
      - { name: ticket, in: path, required: true, schema: { type: integer } }
    post:
      tags: [Account]
      summary: Reply on your own ticket — reopens a resolved ticket; 403 on a foreign ticket
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, required: [body], properties: { body: { type: string, maxLength: 4000 } } }
      responses: { "201": { description: Created }, "403": { $ref: "#/components/responses/Forbidden" } }

  # --------------------------------------------------------------- Content (course publish)
  /courses/{course}/publish:
    parameters:
      - { name: course, in: path, required: true, schema: { type: integer } }
    post:
      tags: [Content]
      summary: Publish a course — requires ≥1 published lesson (content.courses.publish)
      responses: { "200": { description: OK }, "422": { description: No published lesson } }
  /courses/{course}/unpublish:
    parameters:
      - { name: course, in: path, required: true, schema: { type: integer } }
    post:
      tags: [Content]
      summary: Unpublish a course (content.courses.publish)
      responses: { "200": { description: OK } }

  # --------------------------------------------------------------- Public (unsigned link)
  /email/unsubscribe/{email}:
    servers:
      - { url: http://localhost, description: Web (not /api/v1) }
    parameters:
      - { name: email, in: path, required: true, schema: { type: string } }
    get:
      tags: [Email]
      summary: One-click marketing unsubscribe (signed URL) — suppresses + unsubscribes matching contacts
      security: []
      parameters:
        - { name: signature, in: query, required: true, schema: { type: string } }
        - { name: expires, in: query, schema: { type: integer } }
      responses:
        "200": { description: HTML confirmation page }
        "403": { description: Invalid/tampered signature }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Sanctum personal access token (mobile / API clients).
    cookieAuth:
      type: apiKey
      in: cookie
      name: mahadum_session
      description: Sanctum stateful session cookie (web SPA); pair with X-XSRF-TOKEN.

  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: { type: string }
      description: Unique key per money-moving request; replays return the cached response.
    OrganizationId:
      name: organization
      in: path
      required: true
      schema: { type: integer }
    CourseId:
      name: course
      in: path
      required: true
      schema: { type: integer }
    LessonId:
      name: lesson
      in: path
      required: true
      schema: { type: integer }
    LearnerId:
      name: learner
      in: path
      required: true
      schema: { type: integer }
    AcceptLanguage:
      name: Accept-Language
      in: header
      required: false
      schema: { type: string }
    DeviceId:
      name: X-Device-Id
      in: header
      required: false
      schema: { type: string }
      description: Device fingerprint, used for referral attribution at register time.

  responses:
    Unauthorized:
      description: Unauthenticated
      content:
        application/json:
          schema: { $ref: "#/components/schemas/MessageError" }
    Forbidden:
      description: Forbidden (missing permission / policy denied)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/MessageError" }
    NotFound:
      description: Not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/MessageError" }
    ValidationError:
      description: Unprocessable entity (validation)
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ValidationErrors" }
    TooManyRequests:
      description: Rate limit exceeded
      headers:
        Retry-After: { schema: { type: integer } }
        X-RateLimit-Limit: { schema: { type: integer } }
        X-RateLimit-Remaining: { schema: { type: integer } }
      content:
        application/json:
          schema: { $ref: "#/components/schemas/MessageError" }
    IdempotencyConflict:
      description: Idempotency key reused with a different body
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
    UpgradeRequired:
      description: Client app below minimum supported version
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }

  schemas:
    ErrorEnvelope:
      type: object
      description: Coded error envelope returned by money/idempotency/version guards and explicit business rules.
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, status]
          properties:
            code: { type: string }
            message: { type: string }
            status: { type: integer }
    MessageError:
      type: object
      description: Laravel default error body (auth / authorization / not-found / abort).
      required: [message]
      properties:
        message: { type: string }
    ValidationErrors:
      type: object
      required: [message, errors]
      properties:
        message: { type: string }
        errors:
          type: object
          additionalProperties:
            type: array
            items: { type: string }
    MessageData:
      type: object
      properties:
        data:
          type: object
          properties:
            message: { type: string }
    IdData:
      type: object
      properties:
        data:
          type: object
          properties:
            id: { type: integer }
    WebhookStatus:
      type: object
      properties:
        status:
          type: string
          description: "duplicate | ignored | funded | subscription_active | reversed | unmatched"
    Paginated:
      type: object
      properties:
        links:
          type: object
          properties:
            first: { type: string, nullable: true }
            last: { type: string, nullable: true }
            prev: { type: string, nullable: true }
            next: { type: string, nullable: true }
        meta:
          type: object
          properties:
            current_page: { type: integer }
            from: { type: integer, nullable: true }
            last_page: { type: integer }
            per_page: { type: integer }
            to: { type: integer, nullable: true }
            total: { type: integer }

    AuthToken:
      type: object
      properties:
        token: { type: string }
        token_type: { type: string, example: Bearer }
        expires_at: { type: string, format: date-time, nullable: true }
        abilities: { type: array, items: { type: string } }
        user: { $ref: "#/components/schemas/User" }

    User:
      type: object
      properties:
        id: { type: integer }
        first_name: { type: string }
        last_name: { type: string }
        name: { type: string }
        email: { type: string, format: email }
        username: { type: string, nullable: true }
        locale: { type: string }
        roles: { type: array, items: { type: string } }
        active_organization_id: { type: integer, nullable: true }

    Language:
      type: object
      properties:
        id: { type: integer }
        code: { type: string }
        name: { type: string }
        script: { type: string, nullable: true }
        is_active: { type: boolean }

    Family:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        child_limit: { type: integer }
        pin_set: { type: boolean }
        wallet: { $ref: "#/components/schemas/Wallet" }
        learners:
          type: array
          items:
            type: object
            properties:
              id: { type: integer }
              display_name: { type: string }
              is_child: { type: boolean }

    Wallet:
      type: object
      properties:
        coin_balance: { type: integer }
        currency_minor: { type: integer }
        currency: { type: string, example: NGN }

    Plan:
      type: object
      properties:
        code: { type: string }
        name: { type: string }
        price_minor: { type: integer }
        currency: { type: string }
        interval: { type: string }
        max_profiles: { type: integer }
        features: {}

    Payout:
      type: object
      properties:
        id: { type: integer }
        amount_minor: { type: integer }
        method: { type: string }
        status: { type: string }
        requested_at: { type: string, format: date-time, nullable: true }
        paid_at: { type: string, format: date-time, nullable: true }

    Course:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        description: { type: string, nullable: true }
        level_band: { type: string, nullable: true }
        status: { type: string }
        is_published: { type: boolean }
        language: { type: string, nullable: true, description: "language code (when loaded)" }
        levels:
          type: array
          nullable: true
          items: { $ref: "#/components/schemas/CourseLevel" }

    CourseData:
      type: object
      properties:
        data: { $ref: "#/components/schemas/Course" }

    CourseUpdate:
      type: object
      properties:
        title: { type: string, maxLength: 255 }
        description: { type: string, nullable: true }
        level_band: { type: string, maxLength: 50, nullable: true }
        language_id: { type: integer }

    CourseLevel:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        position: { type: integer }
        has_assessment: { type: boolean }
        lessons:
          type: array
          nullable: true
          items: { $ref: "#/components/schemas/Lesson" }

    Lesson:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        position: { type: integer }
        est_minutes: { type: integer }
        is_locked_by_default: { type: boolean }
        version: { type: integer }
        published_at: { type: string, format: date-time, nullable: true }
        is_published: { type: boolean }
        components:
          type: array
          nullable: true
          items: { $ref: "#/components/schemas/LessonComponent" }

    LessonComponent:
      type: object
      properties:
        id: { type: integer }
        type: { type: string }
        position: { type: integer }
        title: { type: string, nullable: true }
        is_required: { type: boolean }
        xp_value: { type: integer }
        settings: { type: object, nullable: true, additionalProperties: true }
        detail:
          type: object
          nullable: true
          additionalProperties: true
          description: "Type-specific payload (video / quiz with answer keys / speaking)."

    LessonComponentCreate:
      type: object
      required: [type]
      properties:
        type: { type: string, enum: [video, quiz, speaking, exercise, game, assignment] }
        position: { type: integer, minimum: 1, nullable: true }
        title: { type: string, maxLength: 255, nullable: true }
        is_required: { type: boolean, default: true }
        xp_value: { type: integer, minimum: 0, default: 0 }
        settings: { type: object, nullable: true, additionalProperties: true }
        video:
          type: object
          nullable: true
          description: "Required when type=video"
          properties:
            title: { type: string, maxLength: 255 }
            presenter_name: { type: string, maxLength: 255, nullable: true }
            duration_seconds: { type: integer, minimum: 1, nullable: true }
            default_quality: { type: string, enum: [240p, 360p, 720p], default: 360p }
            status: { type: string, enum: [uploading, processing, ready, failed], default: ready }
            language_id: { type: integer, nullable: true }
        quiz:
          type: object
          nullable: true
          description: "Required when type=quiz"
          properties:
            title: { type: string, maxLength: 255, nullable: true }
            pass_threshold: { type: number, minimum: 0, maximum: 1, default: 0.6 }
            shuffle_questions: { type: boolean }
            max_attempts: { type: integer, minimum: 1, nullable: true }
            hearts_enabled: { type: boolean, default: true }
            questions:
              type: array
              items:
                type: object
                properties:
                  type: { type: string, maxLength: 50 }
                  prompt: { type: string }
                  explanation: { type: string, nullable: true }
                  target_text: { type: string, nullable: true }
                  points: { type: integer, minimum: 1, default: 1 }
                  options:
                    type: array
                    items:
                      type: object
                      properties:
                        label: { type: string }
                        is_correct: { type: boolean }
                        match_target: { type: string, nullable: true }
        speaking:
          type: object
          nullable: true
          description: "Required when type=speaking"
          properties:
            prompt_text: { type: string }
            target_text: { type: string, nullable: true }
            tone_targets: { type: array, items: { type: string }, nullable: true }

    SchoolClassInput:
      type: object
      required: [name]
      properties:
        name: { type: string, maxLength: 255 }
        level: { type: string, maxLength: 100, nullable: true }
        teacher_user_id: { type: integer, nullable: true }
