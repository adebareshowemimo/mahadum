        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      total_purchased: { type: integer }
                      active_filled: { type: integer }
                      allocations:
                        type: array
                        items:
                          type: object
                          properties:
                            id: { type: integer }
                            total_purchased: { type: integer }
                            active_filled: { type: integer }
                            term_label: { type: string, nullable: true }
                            expires_at: { type: string, format: date-time, nullable: true }
        "403": { $ref: "#/components/responses/Forbidden" }

  /schools/{organization}/seats/purchase:
    parameters:
      - $ref: "#/components/parameters/OrganizationId"
    post:
      tags: [School]
      summary: Purchase seats (schools.seats.purchase)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [quantity]
              properties:
                quantity: { type: integer, minimum: 1, maximum: 100000 }
                term_label: { type: string, maxLength: 100, nullable: true }
                auto_renew: { type: boolean }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      allocation_id: { type: integer }
                      quantity: { type: integer }
                      discount_percent: { type: integer }
