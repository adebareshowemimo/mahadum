# Apache vhost for staging — single subdomain serves both the built React SPA
# (static files) and the Laravel API (PHP), so Sanctum bearer/session auth and
# CORS never cross an origin boundary. See deploy/README.md for setup steps.
#
# Install:
#   sudo cp deploy/apache/mahadum-staging.conf /etc/apache2/sites-available/
#   sudo a2enmod rewrite headers
#   sudo a2ensite mahadum-staging
#   sudo systemctl reload apache2
#   sudo certbot --apache -d mahadum.agunfoninteractivity.com   # adds the :443 vhost

<VirtualHost *:80>
    ServerName mahadum.agunfoninteractivity.com
    DocumentRoot /var/www/mahadum/public

    <Directory /var/www/mahadum/public>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/mahadum-staging-error.log
    CustomLog ${APACHE_LOG_DIR}/mahadum-staging-access.log combined
</VirtualHost>
